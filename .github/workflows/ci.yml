name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install clang-format (LLVM snapshot, v20)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          echo "deb https://apt.llvm.org/noble/ llvm-toolchain-noble main" | \
            sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-20 || sudo apt-get install -y clang-format-19
          CF=$(command -v clang-format-20 || command -v clang-format-19)
          echo "CF=$CF" >> "$GITHUB_ENV"
          $CF --version

      - name: Check formatting
        run: |
          find include src testing tests bench -name '*.h' -o -name '*.cc' | \
            xargs $CF --dry-run --Werror

  lint:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 clang-tidy-18 llvm-18-dev cmake ninja-build libboost-dev ragel
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy /usr/bin/clang-tidy-18 100

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm

      - name: Lint
        run: |
          # Exclude all arch-specific SIMD backends — only lint scalar
          # and main parser code (arch-independent).
          find src -name '*.cc' \
            ! -path '*/simd/sse2.cc' \
            ! -path '*/simd/avx2.cc' \
            ! -path '*/simd/avx512.cc' \
            ! -path '*/simd/neon.cc' \
            ! -path '*/simd/sve.cc' | \
            xargs clang-tidy -p build --warnings-as-errors='bugprone-*,performance-*'

  test:
    name: Build & Test
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        compiler: [clang, gcc]
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build llvm-18-dev libboost-dev ragel
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang-18
            sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
            sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100
          fi

      - name: Configure
        run: |
          LLVM_OPT="-DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm"
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            CC=clang CXX=clang++ cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} $LLVM_OPT
          else
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} $LLVM_OPT
          fi

      - name: Build
        run: ninja -C build

      - name: Test
        run: ctest --test-dir build --output-on-failure --no-tests=error -j 1 --timeout 120

  test-no-jit:
    name: Build & Test (no JIT)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libboost-dev

      - name: Configure
        run: cmake -B build -G Ninja -DRUT_ENABLE_JIT=OFF -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: ninja -C build

      - name: Test
        run: ctest --test-dir build --output-on-failure --no-tests=error -j 1 --timeout 120

  bench-simd-x86:
    name: SIMD scan_uri bench (x86)
    runs-on: ubuntu-24.04
    # Informational — perf numbers go to the log so reviewers can see
    # SIMD speedup across ISAs side-by-side. Doesn't fail on regression
    # (would need a stable baseline + tolerance; left to follow-up).
    #
    # Runner pool: GitHub-hosted ubuntu-24.04 runners are a mixed pool
    # of Intel Xeon (Ice Lake-class, AVX-512 capable) and AMD EPYC
    # 7763 / 9V74 (Zen 3/4, AVX-512 absent or masked off in the VM
    # SKU). The bench step runtime-checks /proc/cpuinfo flags and
    # skips ISAs the runner can't execute, so the avx512 column may
    # be absent depending on which CPU was scheduled. We tried
    # ubuntu-22.04 to bias toward Intel; that pool turned out to
    # share the same AMD-heavy distribution AND its 5.15 kernel
    # headers don't have the io_uring features rut_runtime depends
    # on, so we stayed on 24.04.
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 cmake ninja-build llvm-18-dev libboost-dev ragel
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100

      - name: Report CPU capabilities
        run: |
          grep -m1 '^model name' /proc/cpuinfo
          # Use only the first 'flags' line (one CPU's-worth) and
          # extract every avx*/sse* token from it. -m1 alone on the
          # outer grep would only print the first matched flag.
          grep -m1 '^flags' /proc/cpuinfo | grep -oE '(avx[0-9a-z_]*|sse[0-9_]*)' | sort -u | tr '\n' ' '
          echo

      - name: Bench across x86 SIMD ISAs
        run: |
          mkdir -p /tmp/bench-results /tmp/dispatch-results
          # GitHub-hosted x86 runners' CPUs vary (Intel Xeon / AMD EPYC).
          # Skip ISAs the CPU can't execute. Per-arch isolation keeps a
          # single failure from aborting the whole job.
          for arch in scalar sse2 avx2 avx512; do
            case $arch in
              sse2)    needs="sse2" ;;
              avx2)    needs="avx2" ;;
              # avx512: gate on AVX512BW (byte/word ops), not just F.
              # avx512.cc uses _mm512_cmpeq_epi8_mask / cmplt_epu8_mask /
              # movepi8_mask, all of which require BW. Knights Landing /
              # Mill expose F+ER+CD+PF but not BW; SkyLake-X and onward
              # have BW. Gating on F alone would let a KNL runner build
              # with -mavx512bw and SIGILL at runtime.
              avx512)  needs="avx512bw" ;;
              scalar)  needs="" ;;
            esac
            if [ -n "$needs" ] && ! grep -qE "^flags.*\b$needs\b" /proc/cpuinfo; then
              echo "::notice::CPU lacks $needs — skipping SIMD_ARCH=$arch"
              continue
            fi
            echo "=== building SIMD_ARCH=$arch ==="
            rm -rf "build-$arch"
            if ! CC=clang CXX=clang++ cmake -B "build-$arch" -G Ninja \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DSIMD_ARCH=$arch \
                  -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm > /dev/null 2> "/tmp/cmake-$arch.err"; then
              echo "::warning::cmake configure failed for SIMD_ARCH=$arch"
              cat "/tmp/cmake-$arch.err"
              continue
            fi
            if ! ninja -C "build-$arch" bench_scan_uri 2> "/tmp/build-$arch.err"; then
              echo "::warning::build failed for SIMD_ARCH=$arch"
              tail -30 "/tmp/build-$arch.err"
              continue
            fi
            ./build-$arch/bench/bench_scan_uri 2> "/tmp/run-$arch.err" | tee "/tmp/bench-results/$arch.txt" || \
              { echo "::warning::scan_uri run failed for SIMD_ARCH=$arch"; cat "/tmp/run-$arch.err"; }
            echo
          done

      - name: Unified comparison report
        run: |
          echo "==============================================================="
          echo "scan_uri SIMD vs scalar — same hardware, different ISA backends"
          echo "==============================================================="
          for arch in scalar sse2 avx2 avx512; do
            f="/tmp/bench-results/$arch.txt"
            if [ ! -f "$f" ]; then
              echo
              echo "--- $arch (skipped: CPU lacks support) ---"
              continue
            fi
            echo
            echo "--- $arch ---"
            cat "$f"
          done

          echo
          echo "==============================================================="
          echo "dispatch comparison — linear scan vs scalar ART vs JIT ART"
          echo "==============================================================="
          for arch in scalar sse2 avx2 avx512; do
            f="/tmp/dispatch-results/$arch.txt"
            if [ ! -f "$f" ]; then
              echo
              echo "--- $arch (skipped: CPU lacks support) ---"
              continue
            fi
            echo
            echo "--- $arch ---"
            cat "$f"
          done

  bench-simd-arm:
    name: SIMD scan_uri bench (arm64)
    runs-on: ubuntu-24.04-arm
    # GitHub-hosted ubuntu-24.04-arm runners are Cobalt 100 (Neoverse N2)
    # with NEON. SVE may or may not be exposed depending on the runner
    # configuration; the bench job below tolerates either case.
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 cmake ninja-build llvm-18-dev libboost-dev ragel
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100

      - name: Report CPU capabilities
        run: |
          grep -m1 '^Features' /proc/cpuinfo || true
          grep -m1 '^CPU implementer' /proc/cpuinfo || true
          grep -m1 '^CPU part' /proc/cpuinfo || true

      - name: Bench across arm64 SIMD ISAs
        run: |
          mkdir -p /tmp/bench-results /tmp/dispatch-results
          # neon is universal on aarch64; sve only if the runner exposes it.
          ARCHES="scalar neon"
          if grep -q -m1 'sve' /proc/cpuinfo; then
            ARCHES="$ARCHES sve"
          else
            echo "::notice::SVE not available on this runner — skipping sve build"
          fi
          # Each arch attempt is isolated — if one fails (e.g. compiler
          # quirk on SVE), the others still run and the job stays green.
          for arch in $ARCHES; do
            echo "=== building SIMD_ARCH=$arch ==="
            rm -rf "build-$arch"
            if ! CC=clang CXX=clang++ cmake -B "build-$arch" -G Ninja \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DSIMD_ARCH=$arch \
                  -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm > /dev/null 2> "/tmp/cmake-$arch.err"; then
              echo "::warning::cmake configure failed for SIMD_ARCH=$arch"
              cat "/tmp/cmake-$arch.err"
              continue
            fi
            if ! ninja -C "build-$arch" bench_scan_uri bench_dispatch_compare 2> "/tmp/build-$arch.err"; then
              echo "::warning::build failed for SIMD_ARCH=$arch"
              tail -30 "/tmp/build-$arch.err"
              continue
            fi
            ./build-$arch/bench/bench_scan_uri 2> "/tmp/run-$arch.err" | tee "/tmp/bench-results/$arch.txt" || \
              { echo "::warning::scan_uri run failed for SIMD_ARCH=$arch"; cat "/tmp/run-$arch.err"; }
            ./build-$arch/bench/bench_dispatch_compare 2> "/tmp/dispatch-$arch.err" | tee "/tmp/dispatch-results/$arch.txt" || \
              { echo "::warning::dispatch_compare run failed for SIMD_ARCH=$arch"; cat "/tmp/dispatch-$arch.err"; }
            echo
          done

      - name: Unified comparison report
        run: |
          echo "==============================================================="
          echo "scan_uri SIMD vs scalar — arm64 backends on same hardware"
          echo "==============================================================="
          # Enable nullglob so an empty result set yields zero loop
          # iterations rather than the literal pattern (which would
          # fail under `bash -e`). If every per-arch attempt failed,
          # we just print a notice and exit clean — the per-arch
          # ::warning::s above already document what went wrong.
          shopt -s nullglob
          results=(/tmp/bench-results/*.txt)
          if [ ${#results[@]} -eq 0 ]; then
            echo "::notice::no per-arch scan_uri results captured — see warnings above"
          else
            for f in "${results[@]}"; do
              arch=$(basename "$f" .txt)
              echo
              echo "--- $arch ---"
              cat "$f"
            done
          fi

          echo
          echo "==============================================================="
          echo "dispatch comparison — linear scan vs scalar ART vs JIT ART (arm64)"
          echo "==============================================================="
          echo "::notice::bench_dispatch_compare is JIT-only and is skipped on arm64 because Vectorscan is x86_64-only"

  coverage:
    name: Code Coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 llvm-18 llvm-18-dev cmake ninja-build libboost-dev ragel
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100
          sudo update-alternatives --install /usr/bin/llvm-profdata llvm-profdata /usr/bin/llvm-profdata-18 100
          sudo update-alternatives --install /usr/bin/llvm-cov llvm-cov /usr/bin/llvm-cov-18 100

      - name: Build with coverage
        run: |
          CC=clang CXX=clang++ cmake -B build -G Ninja \
            -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DLLVM_DIR=/usr/lib/llvm-18/lib/cmake/llvm
          ninja -C build

      - name: Run tests
        run: |
          LLVM_PROFILE_FILE=build/test_buffer.profraw ./build/tests/test_buffer
          LLVM_PROFILE_FILE=build/test_types.profraw ./build/tests/test_types
          LLVM_PROFILE_FILE=build/test_network.profraw ./build/tests/test_network
          LLVM_PROFILE_FILE=build/test_integration.profraw ./build/tests/test_integration
          LLVM_PROFILE_FILE=build/test_arena.profraw ./build/tests/test_arena
          LLVM_PROFILE_FILE=build/test_expected.profraw ./build/tests/test_expected
          LLVM_PROFILE_FILE=build/test_http_parser.profraw ./build/tests/test_http_parser
          LLVM_PROFILE_FILE=build/test_drain.profraw ./build/tests/test_drain
          LLVM_PROFILE_FILE=build/test_access_log.profraw ./build/tests/test_access_log
          LLVM_PROFILE_FILE=build/test_fault_injection.profraw ./build/tests/test_fault_injection
          LLVM_PROFILE_FILE=build/test_metrics.profraw ./build/tests/test_metrics
          LLVM_PROFILE_FILE=build/test_chunked_parser.profraw ./build/tests/test_chunked_parser
          LLVM_PROFILE_FILE=build/test_rir.profraw ./build/tests/test_rir
          LLVM_PROFILE_FILE=build/test_shard_control.profraw ./build/tests/test_shard_control
          LLVM_PROFILE_FILE=build/test_traffic_capture.profraw ./build/tests/test_traffic_capture
          LLVM_PROFILE_FILE=build/test_traffic_replay.profraw ./build/tests/test_traffic_replay
          LLVM_PROFILE_FILE=build/test_sim.profraw ./build/tests/test_sim
          LLVM_PROFILE_FILE=build/test_route_trie.profraw ./build/tests/test_route_trie
          LLVM_PROFILE_FILE=build/test_route_art.profraw ./build/tests/test_route_art
          LLVM_PROFILE_FILE=build/test_route_select.profraw ./build/tests/test_route_select

      - name: Generate coverage report
        run: |
          llvm-profdata merge build/*.profraw -o build/merged.profdata

          # Report runtime coverage as the UNION across test binaries:
          # a line counts as covered if any binary hits it. `llvm-cov
          # report` alone picks one binary's instantiation per line for
          # inline/template functions in headers, which undercounts
          # coverage dramatically (e.g. handle_jit_outcome<Loop> has
          # different instantiations in test_network vs test_integration
          # — whichever comes first wins the reporting slot). The helper
          # walks per-binary JSON exports and max-merges per line.
          #
          # io_uring_backend / epoll_backend are excluded: require
          # kernel features / permissions that are unreliable in CI.
          # They are tested via conditional integration tests.
          #
          # test_traffic_capture / test_traffic_replay / test_sim /
          # test_shard_control are not passed as --object because they
          # instantiate callbacks_impl.h templates for test-only loop
          # types; the union merge would incorrectly count those as
          # real production paths. They still run above for correctness
          # validation.
          python3 scripts/coverage_report.py \
            --profile build/merged.profdata \
            --threshold 97 \
            build/tests/test_buffer \
            build/tests/test_types \
            build/tests/test_network \
            build/tests/test_integration \
            build/tests/test_arena \
            build/tests/test_http_parser \
            build/tests/test_expected \
            build/tests/test_drain \
            build/tests/test_access_log \
            build/tests/test_fault_injection \
            build/tests/test_metrics \
            build/tests/test_chunked_parser \
            build/tests/test_rir \
            build/tests/test_route_trie \
            build/tests/test_route_art \
            build/tests/test_route_select
