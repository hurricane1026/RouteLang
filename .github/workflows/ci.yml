name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find include/rout src -name '*.h' -o -name '*.cc' | \
            xargs clang-format --dry-run --Werror

  lint:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy cmake ninja-build

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++

      - name: Lint
        run: |
          find src -name '*.cc' | \
            xargs clang-tidy -p build --warnings-as-errors='bugprone-*,performance-*'

  test:
    name: Build & Test
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        compiler: [clang, gcc]
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Configure
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            CC=clang CXX=clang++ cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          else
            cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          fi

      - name: Build
        run: ninja -C build

      - name: Test
        run: ./build/tests/test_network
